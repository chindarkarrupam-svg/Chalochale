<!DOCTYPE html>

</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">Chalo Chale</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Destination</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"  href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Packages</a>
        </li>
      </ul>
     <button type="button" class="btn btn-warning me-1" onclick="window.location.href='login.html'">Login</button>
     <button type="button" class="btn btn-warning" onclick="window.location.href='signup.html'">Sign up</button>

    </div>
  </div>
</nav>

<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">

            <div class="col-12 col-md-7 col-lg-5">
                <div class="card shadow-lg p-4 rounded-4">

                    <h3 class="text-center fw-bold mb-4">Sign In</h3>

                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" placeholder="Enter email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" placeholder="Enter password">
                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Sign In
                        </button>

                        <p class="text-center mt-3">
                            New user?
                            <a href="signup.html">Create Account</a>
                        </p>
                    </form>

                </div>
            </div>

        </div>
    </div>
</section>
