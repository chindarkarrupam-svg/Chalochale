<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chalo Chale - Your Travel Companion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container-fluid">
    <a class="navbar-brand fw-bold" href="#">Chalo Chale</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" aria-current="page" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Destination</a>
        </li>
        <li class="nav-item">
          <a class="nav-link"  href="#">About</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Contact</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="#">Packages</a>
        </li>
      </ul>
     <button type="button" class="btn btn-warning me-2">Login</button>
     <button type="button" class="btn btn-warning">Sign up</button>

    </div>
  </div>
</nav>

<div class="modal-body">
        <div class="row">
          <div class="col">
            <div class="mb-3">
              <label for="fullName" class="form-label">Full Name</label>
              <input type="text" class="form-control" id="fullName" placeholder="Enter your Name">
            </div>
          </div>
          <div class="col">
            <div class="mb-3">
              <label for="email" class="form-label">Email address</label>
              <input type="email" class="form-control" id="email" placeholder="name@example.com">
            </div>
          </div>
        </div>

        <div class="row">
          <div class="col">
            <label for="destination" class="form-label">Select Destination</label>
            <select class="form-select" id="destination" aria-label="Default select example">
              <option selected>Goa</option>
              <option value="1">Taj Mahal</option>
              <option value="2">Hawa Mahal</option>
              <option value="3">Gateway of India</option>
            </select>
          </div>
          <div class="col">
            <label for="travelDate" class="form-label">Travel Date</label>
            <input type="date" class="form-control" id="travelDate">
          </div>

          <div class="row">
            <div class="col">
              <div class="mb-3">
                <label for="peopleCount" class="form-label">Number of People</label>
                <input type="number" class="form-control" id="peopleCount" placeholder="Enter number of people">
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col">
              <div class="mb-3">
                <label for="message" class="form-label">Special Requests</label>
                <textarea class="form-control" id="message" rows="3" placeholder="Any special requests?"></textarea>
              </div>
            </div>
          </div>
        </div>
      </div>
</body>
</html>
